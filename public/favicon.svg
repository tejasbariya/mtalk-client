<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="glowGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff00aa;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="glassGradient1" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.05" />
      <stop offset="70%" style="stop-color:#ffffff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.2" />
    </radialGradient>
    
    <filter id="glassFrosted1">
      <feGaussianBlur stdDeviation="2" />
    </filter>
    
    <filter id="dropShadow1" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#a020f0" flood-opacity="0.9"/>
    </filter>
  </defs>

  <g transform="translate(15, 10)">
    <g filter="url(#dropShadow1)">
      <path d="M70,10 C100,10 120,30 120,60 C120,90 100,110 70,110 H60 L40,130 L40,110 C20,110 10,90 10,60 C10,30 30,10 60,10 Z" fill="url(#glassGradient1)" filter="url(#glassFrosted1)"/>
      
      <path d="M70,10 C100,10 120,30 120,60 C120,90 100,110 70,110 H60 L40,130 L40,110 C20,110 10,90 10,60 C10,30 30,10 60,10 Z" fill="none" stroke="url(#glowGradient1)" stroke-width="6"/>
      
      <path d="M40,30 V90 H55 V75 L65,85 L75,75 V90 H90 V30 H40 Z M50,40 H80 M50,55 H70" fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
      
      <path d="M55,75 L65,85 L75,75" fill="none" stroke="url(#glowGradient1)" stroke-width="5" filter="url(#dropShadow1)" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
